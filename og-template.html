<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>OG Image - Sarah Randriarivelo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px; height: 630px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0A0A0A 0%, #1a1a2e 50%, #16213e 100%);
      color: #fff; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    /* Animated gradient orbs */
    .orb {
      position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.6;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: #F77527; top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #7449C8; bottom: -50px; right: -50px; animation-delay: -4s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, 20px); }
    }
    
    .content {
      text-align: center; z-index: 2; padding: 40px;
      background: rgba(255,255,255,0.05); border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      max-width: 900px;
    }
    .profile {
      width: 140px; height: 140px; border-radius: 50%;
      border: 4px solid #F77527; margin: 0 auto 20px;
      object-fit: cover; background: #141414;
      box-shadow: 0 8px 30px rgba(247, 117, 39, 0.4);
    }
    h1 {
      font-size: 42px; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(90deg, #F77527, #7449C8, #C42B8B);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .subtitle {
      font-size: 22px; color: #B3B3B3; margin-bottom: 16px;
      font-weight: 500;
    }
    .tagline {
      font-size: 18px; color: #E0E0E0; margin-bottom: 24px;
      line-height: 1.5;
    }
    .badges {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .badge {
      padding: 8px 16px; background: rgba(255,255,255,0.1);
      border-radius: 50px; font-size: 14px; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .footer {
      margin-top: 24px; font-size: 14px; color: #888;
    }
    .footer strong { color: #F77527; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  
  <div class="content">
    <!-- Replace src with your actual photo URL -->
    <img src="assets/sarah-ursula-randriarivelo-profile.webp" alt="Sarah" class="profile">
    
    <h1>Sarah Ursula Randriarivelo</h1>
    <p class="subtitle">Data Analyst | Power BI & MCP Server | SAGE100</p>
    <p class="tagline">Helping SMEs in Madagascar & beyond turn raw data into trusted, actionable business insights.</p>
    
    <div class="badges">
      <span class="badge">Power BI</span>
      <span class="badge">Python</span>
      <span class="badge">SAGE100</span>
      <span class="badge">MCP Server</span>
      <span class="badge">FR/EN</span>
    </div>
    
    <p class="footer">Portfolio: <strong>sarah-ursula.netinter.ovh</strong></p>
  </div>
</body>
</html>
